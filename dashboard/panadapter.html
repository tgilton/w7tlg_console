<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W7TLG Panadapter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --border:    #21262d;
  --border2:   #30363d;
  --cyan:      #00d4ff;
  --cyan-dim:  #005f73;
  --amber:     #ff8c00;
  --amber-dim: #5a3200;
  --green:     #00e676;
  --green-dim: #003d1f;
  --red:       #ff3333;
  --muted:     #58677a;
  --label:     #8b949e;
  --text:      #c9d1d9;
  --mono:      'JetBrains Mono', monospace;
  --sans:      'Inter', system-ui, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
}

.header {
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border2);
}

.callsign {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 0.12em;
}

.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  display: inline-block;
  margin-right: 6px;
}
.conn-dot.ok { background: var(--green); }

.header-status {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 0.75rem;
  color: var(--muted);
  font-family: var(--mono);
}

.sdr-badge {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  color: var(--green);
  background: var(--green-dim);
}
.sdr-badge.tx { color: var(--amber); background: var(--amber-dim); }
.sdr-badge.unavailable { color: var(--red); background: #4a0000; }

.controls {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.control-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

#freq-input {
  font-family: var(--mono);
  font-size: 0.9rem;
  background: #0a0d11;
  border: 1px solid var(--border2);
  color: var(--cyan);
  padding: 5px 8px;
  border-radius: 3px;
  width: 130px;
}

.btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 6px 14px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: #161b22;
  color: var(--label);
  cursor: pointer;
}
.btn:hover { border-color: var(--cyan-dim); color: var(--text); }
.btn.active { background: #0d2538; border-color: var(--cyan); color: var(--cyan); }

#span-slider { width: 160px; accent-color: var(--cyan); cursor: pointer; }

.smeter-mini-wrap {
  width: 130px;
  height: 14px;
  background: #0a0d11;
  border: 1px solid var(--border2);
  border-radius: 3px;
  overflow: hidden;
}
.smeter-mini-bar {
  height: 100%;
  width: 0%;
  background: var(--green);
  transition: width 0.15s ease-out, background-color 0.15s ease-out;
}
.smeter-mini-bar.over-s9 { background: var(--red); }
.smeter-mini-label {
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--cyan);
  min-width: 32px;
}
.smeter-mini-db {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--muted);
  min-width: 68px;
}
#s9-cal-input {
  font-family: var(--mono);
  font-size: 0.7rem;
  background: #0a0d11;
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 4px 5px;
  border-radius: 3px;
  width: 50px;
}

.span-val {
  font-family: var(--mono);
  color: var(--cyan);
  min-width: 70px;
  display: inline-block;
}

.spectrum-wrap {
  padding: 16px;
}

.spectrum-canvas-wrap {
  background: #0a0d11;
  border: 1px solid var(--border);
  border-radius: 4px;
  height: 280px;
  position: relative;
  cursor: grab;
}
.spectrum-canvas-wrap.dragging { cursor: grabbing; }
#spectrum-canvas { width: 100%; height: 100%; display: block; }

.freq-axis {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--muted);
  padding: 4px 4px 8px;
}

.waterfall-canvas-wrap {
  background: #0a0d11;
  border: 1px solid var(--border);
  border-radius: 4px;
  height: 280px;
  position: relative;
}
#waterfall-canvas { width: 100%; height: 100%; display: block; }
#waterfall-overlay-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
</style>
</head>
<body>

<header class="header">
  <span class="callsign">
    <span class="conn-dot" id="conn-dot"></span>W7TLG PANADAPTER
  </span>
  <div class="header-status">
    <span class="sdr-badge unavailable" id="sdr-badge">SDR —</span>
    <span id="hdr-time">—</span>
  </div>
</header>

<div class="controls">
  <span class="control-label">Center Freq</span>
  <input type="text" id="freq-input" value="14.074000" placeholder="MHz">
  <button class="btn" onclick="tuneToInput()">Tune</button>

  <span class="control-label" style="margin-left:16px">Span</span>
  <input type="range" id="span-slider" min="0" max="1000" value="500"
         oninput="onSpanSlider(this.value)">
  <span class="span-val" id="span-val">15.0 kHz</span>

  <button class="btn" id="whole-band-btn" onclick="snapToWholeBand()" style="margin-left:8px">Whole Band</button>

  <button class="btn" id="mute-btn" onclick="toggleMute()" style="margin-left:8px">Audio: Muted</button>
</div>

<div class="controls">
  <label class="control-label"><input type="checkbox" id="auto-scale-cb" checked onchange="onAutoScaleToggle(this.checked)"> Auto</label>

  <span class="control-label" style="margin-left:16px">Floor</span>
  <input type="range" id="floor-slider" min="-160" max="0" value="-90" disabled
         oninput="onFloorSlider(this.value)">
  <span class="span-val" id="floor-val">-90 dB</span>

  <span class="control-label" style="margin-left:16px">Gain</span>
  <input type="range" id="gain-slider" min="0" max="100" value="50" disabled
         oninput="onGainSlider(this.value)">
  <span class="span-val" id="gain-val">80 dB range</span>

  <span class="control-label" style="margin-left:16px">Palette</span>
  <select id="palette-select" onchange="onPaletteSelect(this.value)">
    <option value="default">Default</option>
    <option value="linrad">Linrad (approx)</option>
  </select>

  <span class="control-label" style="margin-left:16px">Signal</span>
  <div class="smeter-mini-wrap"><div class="smeter-mini-bar" id="smeter-mini-bar"></div></div>
  <span class="smeter-mini-label" id="smeter-mini-label">S0</span>
  <span class="smeter-mini-db" id="smeter-mini-db">— dBFS</span>
  <span class="control-label" style="margin-left:8px">S9 Cal</span>
  <input type="number" id="s9-cal-input" value="-75" step="1" oninput="onS9CalInput(this.value)">
</div>

<div class="spectrum-wrap">
  <div class="spectrum-canvas-wrap" id="spectrum-wrap">
    <canvas id="spectrum-canvas"></canvas>
  </div>
  <div class="freq-axis">
    <span id="axis-lo">—</span>
    <span id="axis-center">—</span>
    <span id="axis-hi">—</span>
  </div>
  <div class="waterfall-canvas-wrap" id="waterfall-wrap">
    <canvas id="waterfall-canvas"></canvas>
    <canvas id="waterfall-overlay-canvas"></canvas>
  </div>
</div>

<script>
'use strict';

// ── Band edges (US Amateur Radio Bands, ARRL chart) ──────────
const BAND_EDGES_HZ = {
  '160m': [1800000, 2000000],
  '80m':  [3500000, 4000000],
  '60m':  [5330500, 5403500],
  '40m':  [7000000, 7300000],
  '30m':  [10100000, 10150000],
  '20m':  [14000000, 14350000],
  '17m':  [18068000, 18168000],
  '15m':  [21000000, 21450000],
  '12m':  [24890000, 24990000],
  '10m':  [28000000, 29700000],
  '6m':   [50000000, 54000000],
};

const SPAN_MIN_HZ = 1000;
const SPAN_MAX_HZ = 2000000;   // full capture width — can't zoom out further without retuning


// ── Main /ws — rig/amp state + commands ─────────────────────
let ws = null;
let rigPtt = false;
let rigBand = null;
let rigMode = null;
let rigFreqHz = null;
let rigPassbandHz = null;
let rigIsDigital = false;
let wholeBandApplied = false;

// DATA-U/digital: the window is locked to exactly DIGITAL_VIEW_SPAN_HZ
// wide with the dial frequency pinned to the left edge — matches
// AudioDemodulator's own digital-mode passband convention (0-3000Hz above
// the dial frequency). This is an ongoing constraint while in this mode,
// not just a one-time default — enforced every tick, not snapshotted and
// restored on enter/exit (an earlier version did that and it broke: a
// transient digital-mode misread right as a transmission started — mode
// is the slowest-polled rig field — fired the "restore" step onto a
// whole-band snapshot, which is exactly the "jumps to full band width at
// the start of a TX" bug). Outside DATA-U the view is left alone entirely
// — free-form pan/zoom, same as before this feature existed.
const DIGITAL_VIEW_SPAN_HZ = 3000;

function handleDigitalViewMode() {
  if (!rigIsDigital) return;
  setViewSpan(DIGITAL_VIEW_SPAN_HZ);
  // Frozen during TX (no center update) so it doesn't chase WSJT-X's
  // small dial wobble around each transmission.
  if (rigFreqHz !== null && (!rigPtt || viewCenterHz === null)) {
    viewCenterHz = rigFreqHz + viewSpanHz / 2;
  }
}

// Eased copy of rigFreqHz used only for the marker's drawn x-position —
// rigFreqHz itself only updates once per rig poll (~100ms), so drawing the
// marker directly at that value made it visibly jump rather than slide as
// the knob turns. The label text still shows the real rigFreqHz.
let displayedRigFreqHz = null;
function updateDisplayedRigFreq() {
  if (rigFreqHz === null) return;
  if (displayedRigFreqHz === null || Math.abs(rigFreqHz - displayedRigFreqHz) > 50000) {
    displayedRigFreqHz = rigFreqHz;   // first frame, or too large a jump to ease (e.g. a retune)
    return;
  }
  displayedRigFreqHz += (rigFreqHz - displayedRigFreqHz) * 0.5;
}

function connectWs() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => { document.getElementById('conn-dot').className = 'conn-dot ok'; };
  ws.onclose = () => {
    document.getElementById('conn-dot').className = 'conn-dot';
    setTimeout(connectWs, 2000);
  };
  ws.onmessage = evt => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'state') {
      const rig = msg.data.rig || {};
      rigPtt = !!rig.ptt;
      rigFreqHz = rig.freq_hz ?? rigFreqHz;
      rigBand = rig.band ?? rigBand;
      rigMode = rig.near_digital_freq ? 'PKTUSB' : (rig.mode || rigMode);
      rigPassbandHz = rig.passband_hz ?? rigPassbandHz;
      rigIsDigital = !!rig.is_digital;

      // Default view is the whole band — manual scroll-to-zoom/drag-to-pan
      // is how you select what to look at; mode changes no longer hijack
      // the view out from under you.
      if (!wholeBandApplied && rigBand && latestFrame) {
        wholeBandApplied = true;
        snapToWholeBand();
      }
      handleDigitalViewMode();
      followRigFrequency();
      sendAudioTargetFromRig();
      updateSdrBadge();
    }
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function updateSdrBadge() {
  const badge = document.getElementById('sdr-badge');
  if (!sdrAvailable) {
    badge.textContent = 'SDR UNAVAILABLE';
    badge.className = 'sdr-badge unavailable';
  } else if (rigPtt) {
    badge.textContent = 'SDR TX — DISCONNECTED';
    badge.className = 'sdr-badge tx';
  } else {
    badge.textContent = 'SDR LIVE';
    badge.className = 'sdr-badge';
  }
}

// ── Spectrum /ws/spectrum — binary frames ────────────────────
let specWs = null;
let sdrAvailable = false;
let pendingHeader = null;
let latestFrame = null;   // { centerFreqHz, spanHz, data: Float32Array } — full capture, ~2MHz wide
let latestFineFrame = null;   // digital-mode fine spectrum — 16kHz wide, centered on the audio target
let pendingRetuneHz = null;   // set while waiting for the SDR to catch up to a requested retune

function connectSpectrumWs() {
  specWs = new WebSocket(`ws://${location.host}/ws/spectrum`);
  specWs.binaryType = 'arraybuffer';
  specWs.onopen = () => {};
  specWs.onclose = () => setTimeout(connectSpectrumWs, 2000);
  specWs.onmessage = evt => {
    if (typeof evt.data === 'string') {
      pendingHeader = JSON.parse(evt.data);
      return;
    }
    if (!pendingHeader) return;
    sdrAvailable = true;
    updateSdrBadge();
    const data = new Float32Array(evt.data);
    const frame = {
      centerFreqHz: pendingHeader.center_freq_hz,
      spanHz: pendingHeader.span_hz,
      data,
    };

    if (pendingHeader.kind === 'fine') {
      // Digital-mode fine spectrum — AudioDemodulator's own decimated
      // baseband, already centered exactly on the audio target (which
      // always tracks the rig), so there's no capture-window-divergence
      // concept to self-heal against here, unlike the wide capture below.
      // Should never arrive during TX (the audio thread skips processing
      // entirely while tx_active) — but tx_active itself is only as
      // prompt as the rig's PTT broadcast, which can lag, so still check
      // rigPtt directly rather than trust that timing blindly: a real
      // (leakage) signal during TX is not a legitimate reading either way.
      latestFineFrame = frame;
      if (rigIsDigital) {
        if (rigPtt) pushWaterfallTxRow();
        else pushWaterfallRow(frame);
      }
    } else if (rigPtt) {
      // SDR Switch disconnects the antenna from the SDR during TX — this
      // IQ is meaningless (disconnected input), not a real band picture.
      // Mark the waterfall distinctly and freeze the spectrum line rather
      // than painting it as if it were a real reading.
      pushWaterfallTxRow();
    } else if (pendingRetuneHz !== null && Math.abs(frame.centerFreqHz - pendingRetuneHz) > 1000) {
      // Waiting for an explicit retune we requested to land — its capture
      // window is stale relative to where the view now expects to be.
      // Freeze rather than crop against a window about to move out from
      // under us.
    } else {
      pendingRetuneHz = null;
      if (viewCenterHz === null || !isViewWithinCapture(frame)) {
        // Either the very first frame, or the capture moved out from under
        // the view for a reason we didn't explicitly request — e.g. a
        // server restart resetting the SDR's default center while this tab
        // stayed open and just auto-reconnected. Self-heal onto the real
        // capture rather than render a degenerate single-bin crop.
        viewCenterHz = frame.centerFreqHz;
      }
      latestFrame = frame;
      if (!rigIsDigital) pushWaterfallRow(frame);
    }
    pendingHeader = null;
  };
}

// ── Clock ─────────────────────────────────────────────────
setInterval(() => {
  const now = new Date();
  document.getElementById('hdr-time').textContent = now.toUTCString().slice(17, 25) + 'Z';
}, 1000);

// ── Controls: tuning ──────────────────────────────────────
function tuneToInput() {
  const mhz = parseFloat(document.getElementById('freq-input').value);
  if (!isFinite(mhz)) return;
  tuneTo(mhz * 1e6);
}

function updateFreqInputDisplay() {
  // Tracks where the SDR is actually tuned (latestFrame.centerFreqHz), not
  // viewCenterHz — panning/zooming (e.g. to Whole Band) never retunes the
  // SDR, so the view's geometric center is a display concept, not "the
  // frequency we're on." This box means the latter.
  const input = document.getElementById('freq-input');
  if (document.activeElement === input) return;   // don't fight the user mid-edit
  if (latestFrame) input.value = (latestFrame.centerFreqHz / 1e6).toFixed(6);
}

// ── Controls: span / zoom / pan ───────────────────────────
let viewSpanHz = 15000;
let viewCenterHz = null;   // null until the first frame arrives

// Slider is 0-1000, mapped log-scale across [SPAN_MIN_HZ, SPAN_MAX_HZ]
function spanFromSlider(v) {
  const t = v / 1000;
  return SPAN_MIN_HZ * Math.pow(SPAN_MAX_HZ / SPAN_MIN_HZ, t);
}
function sliderFromSpan(hz) {
  const t = Math.log(hz / SPAN_MIN_HZ) / Math.log(SPAN_MAX_HZ / SPAN_MIN_HZ);
  return Math.round(t * 1000);
}

function setViewSpan(hz) {
  viewSpanHz = Math.max(SPAN_MIN_HZ, Math.min(SPAN_MAX_HZ, hz));
  document.getElementById('span-slider').value = sliderFromSpan(viewSpanHz);
  updateSpanLabel();
}

function updateSpanLabel() {
  const el = document.getElementById('span-val');
  el.textContent = viewSpanHz >= 1e6 ? (viewSpanHz / 1e6).toFixed(2) + ' MHz'
                                      : (viewSpanHz / 1e3).toFixed(2) + ' kHz';
}

function onSpanSlider(v) {
  viewSpanHz = spanFromSlider(parseInt(v));
  updateSpanLabel();
}

// Tune the radio (and, if necessary, the SDR's capture center) to freqHz.
// recenterView is true for the typed-frequency Tune button — a deliberate
// jump to somewhere possibly off-screen, worth panning to. Clicking a peak
// you can already see on the spectrum is the opposite case: the target is
// by definition already visible, and recentering the view under it just
// disorients — the marker moving to the click point is feedback enough.
//
// Deliberately does NOT touch mode. It used to auto-select a mode from the
// band-segment convention (CW below the phone boundary, LSB/USB above) —
// but that silently overrode whatever mode the operator had explicitly
// chosen, snapping back to CW (and its narrow filter) on the next click
// into a CW/digital segment. The radio's current mode/NAR-WID setting is
// ground truth; tuning shouldn't reinterpret it.
function tuneTo(freqHz, recenterView = true) {
  freqHz = Math.round(freqHz);
  send({ cmd: 'set_frequency', freq_hz: freqHz });

  if (recenterView) viewCenterHz = freqHz;
  if (latestFrame) {
    const margin = viewSpanHz / 2;
    const lo = latestFrame.centerFreqHz - latestFrame.spanHz / 2 + margin;
    const hi = latestFrame.centerFreqHz + latestFrame.spanHz / 2 - margin;
    if (freqHz < lo || freqHz > hi) {
      // Target is outside the SDR's current capture window — it needs to
      // physically retune. That takes a moment; freeze rendering (same
      // pattern as the TX freeze) until a frame confirms the SDR caught up,
      // rather than cropping the view against a now-stale capture window.
      send({ cmd: 'set_panadapter_freq', freq_hz: freqHz });
      pendingRetuneHz = freqHz;
    }
  }
  // No clampViewToCapture() here — that's for drag-to-pan within an
  // unchanged capture window, not for a deliberate tune that may itself be
  // moving that window.
}

function snapToWholeBand() {
  const edges = BAND_EDGES_HZ[rigBand];
  if (!edges) return;
  const [lo, hi] = edges;
  setViewSpan(Math.min(hi - lo, SPAN_MAX_HZ));
  viewCenterHz = (lo + hi) / 2;
}

// The radio (knob, band buttons on the main console, etc.) is the ground
// truth for frequency — this keeps the panadapter following it without
// fighting manual pan/zoom. Two independent things track rigFreqHz here:
// the SDR's actual ~2MHz capture window (must be retuned if the knob wanders
// near/past its edge, same mechanism tuneTo() uses), and the visible view
// (only recentered once the rig marker nears the edge of what's on screen,
// not every poll tick — a hybrid between "always follow" and "never follow").
function followRigFrequency() {
  if (rigFreqHz === null) return;

  if (latestFrame) {
    const margin = viewSpanHz / 2;
    const lo = latestFrame.centerFreqHz - latestFrame.spanHz / 2 + margin;
    const hi = latestFrame.centerFreqHz + latestFrame.spanHz / 2 - margin;
    if ((rigFreqHz < lo || rigFreqHz > hi) && pendingRetuneHz === null) {
      send({ cmd: 'set_panadapter_freq', freq_hz: rigFreqHz });
      pendingRetuneHz = rigFreqHz;
    }
  }

  // Digital mode's view is fully owned by handleDigitalViewMode() (locked
  // span, dial pinned to the left edge) — the generic centered-recenter
  // below would immediately fight it, since "pinned at the left edge" is,
  // by definition, far enough from center to cross this threshold.
  if (rigIsDigital) return;

  if (viewCenterHz !== null) {
    const halfSpan = viewSpanHz / 2;
    if (Math.abs(rigFreqHz - viewCenterHz) > halfSpan * 0.8) {
      viewCenterHz = rigFreqHz;
    }
  }
}

// Scroll-to-zoom + drag-to-pan directly on the spectrum canvas.
const spectrumWrap = document.getElementById('spectrum-wrap');
spectrumWrap.addEventListener('wheel', evt => {
  evt.preventDefault();
  const factor = evt.deltaY > 0 ? 1.15 : (1 / 1.15);
  setViewSpan(viewSpanHz * factor);
}, { passive: false });

// Cursor crosshair: a pure visual readout of the frequency under the mouse
// while hovering, with no effect on audio or tuning — freezes in place
// (simply stops updating) once the cursor leaves, since that's the only way
// to read off a signal's frequency otherwise. Each listener uses ITS OWN
// element's bounding rect (not a shared parent's), since the outer
// .spectrum-wrap container has padding that would skew the pixel-to-frequency
// math if used directly.
let cursorFreqHz = null;

function attachHoverCrosshair(el) {
  el.addEventListener('mousemove', evt => {
    if (viewCenterHz === null) return;
    const rect = el.getBoundingClientRect();
    const x = evt.clientX - rect.left;
    cursorFreqHz = (viewCenterHz - viewSpanHz / 2) + (x / rect.width) * viewSpanHz;
  });
}
attachHoverCrosshair(spectrumWrap);
attachHoverCrosshair(document.getElementById('waterfall-wrap'));

// ── Audio: always at the rig's live frequency, unless muted ────────────
// The radio is ground truth, so there's nothing to hover or lock onto —
// audio simply follows wherever the rig (knob, band buttons, click-to-tune)
// is actually tuned, using its real mode and NAR/WID/WIDTH passband rather
// than guessing either from frequency.
let audioCtx = null;
let audioWs = null;
let audioWorkletNode = null;
let audioWorkletReady = null;   // Promise, set once addModule() has been kicked off
let audioMuted = true;
let lastAudioFreqHz = null;
let lastAudioMode = null;
let lastAudioBandwidthHz = null;

function sidebandForRigMode(mode) {
  return (mode && mode.includes('L')) ? 'LSB' : 'USB';
}

// AudioWorkletNode runs PCM playback on the dedicated audio thread via a
// ring buffer (dashboard/audio-worklet.js) instead of scheduling a discrete
// AudioBufferSourceNode per incoming WebSocket message — the previous
// approach meant any main-thread delay (canvas redraws, GC, etc.) right
// when a message arrived produced an audible gap, and that scaled with how
// many messages/sec there were. The worklet is immune to that: it just
// reads continuously, regardless of when data shows up.
function ensureAudioWorklet() {
  // Pin the context to our actual source rate (16kHz) rather than letting
  // it default to the system's hardware rate (commonly 44100 or 48000).
  // The worklet's own resampling is crude sample-repetition — fine for an
  // exact integer ratio, but produces an irregular (audible, warbly)
  // repeat pattern at a non-integer one. Matching rates means zero
  // resampling happens in our code at all; the browser's own native
  // resampler handles the hop to hardware output instead.
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  if (!audioWorkletReady) {
    audioWorkletReady = audioCtx.audioWorklet.addModule('/audio-worklet.js').then(() => {
      audioWorkletNode = new AudioWorkletNode(audioCtx, 'pcm-stream-processor');
      audioWorkletNode.connect(audioCtx.destination);
    });
  }
  return audioWorkletReady;
}

function ensureAudioWs() {
  if (audioWs && audioWs.readyState <= WebSocket.OPEN) return;
  audioWs = new WebSocket(`ws://${location.host}/ws/audio`);
  audioWs.binaryType = 'arraybuffer';
  // Unlike /ws and /ws/spectrum, nothing else re-establishes this socket if
  // it drops mid-session — reconnect automatically as long as we're still
  // unmuted, matching the pattern used elsewhere in this file.
  audioWs.onclose = () => { if (!audioMuted) setTimeout(ensureAudioWs, 1000); };
  audioWs.onmessage = evt => {
    if (!audioWorkletNode) return;
    const pcm16 = new Int16Array(evt.data);
    const f32 = new Float32Array(pcm16.length);
    for (let i = 0; i < pcm16.length; i++) f32[i] = pcm16[i] / 32768;
    audioWorkletNode.port.postMessage(f32);
  };
}

function sendAudioTargetFromRig(force) {
  if (audioMuted || rigFreqHz === null) return;
  const mode = sidebandForRigMode(rigMode);
  const bandwidthHz = (rigPassbandHz && rigPassbandHz > 0) ? rigPassbandHz : 2400;
  if (!force && rigFreqHz === lastAudioFreqHz && mode === lastAudioMode
      && bandwidthHz === lastAudioBandwidthHz) return;
  lastAudioFreqHz = rigFreqHz;
  lastAudioMode = mode;
  lastAudioBandwidthHz = bandwidthHz;
  send({ cmd: 'set_audio_target', freq_hz: rigFreqHz, mode, bandwidth_hz: bandwidthHz });
}

function toggleMute() {
  audioMuted = !audioMuted;
  const btn = document.getElementById('mute-btn');
  btn.textContent = audioMuted ? 'Audio: Muted' : 'Audio: Live';
  btn.classList.toggle('active', !audioMuted);
  if (audioMuted) {
    send({ cmd: 'set_audio_enabled', enabled: false });
  } else {
    ensureAudioWorklet().then(() => {
      ensureAudioWs();
      send({ cmd: 'set_audio_enabled', enabled: true });
      sendAudioTargetFromRig(true);
    });
  }
}

let dragging = false, dragMoved = false, dragStartX = 0, dragStartCenter = 0;
spectrumWrap.addEventListener('mousedown', evt => {
  if (evt.button !== 0) return;   // only the left button drives drag/click-to-tune
  dragging = true;
  dragMoved = false;
  dragStartX = evt.clientX;
  dragStartCenter = viewCenterHz || 0;
  spectrumWrap.classList.add('dragging');
});
window.addEventListener('mouseup', evt => {
  if (dragging && !dragMoved && latestFrame && viewCenterHz !== null) {
    // No real drag occurred — treat as click-to-tune at this position.
    const rect = spectrumWrap.getBoundingClientRect();
    const x = evt.clientX - rect.left;
    const freqHz = (viewCenterHz - viewSpanHz / 2) + (x / rect.width) * viewSpanHz;
    tuneTo(freqHz, false);
  }
  dragging = false;
  spectrumWrap.classList.remove('dragging');
});
window.addEventListener('mousemove', evt => {
  if (!dragging || !latestFrame) return;
  const dx = evt.clientX - dragStartX;
  if (Math.abs(dx) > 3) dragMoved = true;
  if (!dragMoved) return;
  const rect = spectrumWrap.getBoundingClientRect();
  const hzPerPx = viewSpanHz / rect.width;
  viewCenterHz = dragStartCenter - dx * hzPerPx;
  clampViewToCapture();
});

function clampViewToCapture() {
  if (!latestFrame || viewCenterHz === null) return;
  const lo = latestFrame.centerFreqHz - latestFrame.spanHz / 2 + viewSpanHz / 2;
  const hi = latestFrame.centerFreqHz + latestFrame.spanHz / 2 - viewSpanHz / 2;
  if (lo <= hi) viewCenterHz = Math.max(lo, Math.min(hi, viewCenterHz));
  else viewCenterHz = latestFrame.centerFreqHz;
}

// True if the current view window actually overlaps real data in this
// frame's capture window. False means the view and the capture have
// diverged (e.g. a server restart silently reset the SDR's center) and the
// crop would degenerate to a clamped sliver instead of real content.
function isViewWithinCapture(frame) {
  const capLo = frame.centerFreqHz - frame.spanHz / 2;
  const capHi = frame.centerFreqHz + frame.spanHz / 2;
  const viewLo = viewCenterHz - viewSpanHz / 2;
  const viewHi = viewCenterHz + viewSpanHz / 2;
  return viewHi > capLo && viewLo < capHi;
}

// ── Crop + decimate the full-capture frame to the current view ──
function cropToView(frame, outPoints) {
  const n = frame.data.length;
  const binHz = frame.spanHz / n;
  const fullLoHz = frame.centerFreqHz - frame.spanHz / 2;
  const viewLoHz = viewCenterHz - viewSpanHz / 2;
  const viewHiHz = viewCenterHz + viewSpanHz / 2;

  let startBin = Math.floor((viewLoHz - fullLoHz) / binHz);
  let endBin = Math.ceil((viewHiHz - fullLoHz) / binHz);
  startBin = Math.max(0, Math.min(n - 1, startBin));
  endBin = Math.max(startBin + 1, Math.min(n, endBin));
  const span = endBin - startBin;

  const out = new Float32Array(outPoints);
  for (let i = 0; i < outPoints; i++) {
    const srcIdx = startBin + Math.floor((i / outPoints) * span);
    out[i] = frame.data[Math.min(n - 1, srcIdx)];
  }
  return out;
}

// ── S-meter — computed from the RSPdx-R2's own spectrum, not rig.strength_db.
// Under this station's SDR Switch wiring the radio's receive antenna port
// sees nothing during RX (the RSPdx-R2 is the actual receiver), so Hamlib's
// STRENGTH level reads a fixed S0 floor always — confirmed live, not a guess.
// S9 Cal is a single adjustable reference point (dBFS that should read as
// S9), not a true dBm calibration — there's no fixed dBFS-to-dBm mapping
// without knowing the SDR's exact RF gain chain, so tune it by ear/comparison
// against a real signal rather than trusting the default.
let s9CalDb = -75;
function onS9CalInput(v) {
  const n = parseFloat(v);
  if (isFinite(n)) s9CalDb = n;
}

// Average power (not dB) across the bins spanning the rig's passband —
// averaging dB directly would be biased low by log compression, same
// reasoning as the server-side spectrum averaging.
function passbandAvgDb(frame, centerHz, bandwidthHz) {
  const n = frame.data.length;
  const binHz = frame.spanHz / n;
  const fullLoHz = frame.centerFreqHz - frame.spanHz / 2;
  let startBin = Math.floor((centerHz - bandwidthHz / 2 - fullLoHz) / binHz);
  let endBin = Math.ceil((centerHz + bandwidthHz / 2 - fullLoHz) / binHz);
  startBin = Math.max(0, Math.min(n - 1, startBin));
  endBin = Math.max(startBin + 1, Math.min(n, endBin));
  let sumPower = 0;
  for (let i = startBin; i < endBin; i++) sumPower += Math.pow(10, frame.data[i] / 10);
  return 10 * Math.log10(sumPower / (endBin - startBin) + 1e-30);
}

// Mirrors rig/rigctld_client.py's smeter_label(): S9 = 0dB re S9, 6dB/S-unit
// below, 10dB/S-unit ("S9+NN") above — same convention as the main console's
// widget, just fed from a different source.
function smeterLabel(strengthDb) {
  if (strengthDb >= 0) {
    const over = Math.round(strengthDb / 10) * 10;
    return over > 0 ? `S9+${over}` : 'S9';
  }
  const s = Math.max(0, Math.min(9, 9 + Math.floor(strengthDb / 6)));
  return `S${s}`;
}

function updateSmeter() {
  if (!latestFrame || rigFreqHz === null) return;
  const bandwidthHz = (rigPassbandHz && rigPassbandHz > 0) ? rigPassbandHz : 2400;
  const dbFs = passbandAvgDb(latestFrame, rigFreqHz, bandwidthHz);
  const strengthDb = dbFs - s9CalDb;   // dB re S9, same scale rig.strength_db uses
  const pct = Math.max(0, Math.min(100, ((strengthDb + 54) / 114) * 100));
  document.getElementById('smeter-mini-bar').style.width = pct + '%';
  document.getElementById('smeter-mini-bar').classList.toggle('over-s9', strengthDb >= 0);
  document.getElementById('smeter-mini-label').textContent = smeterLabel(strengthDb);
  document.getElementById('smeter-mini-db').textContent = dbFs.toFixed(1) + ' dBFS';
}

// ── Spectrum line rendering ────────────────────────────────
const canvas = document.getElementById('spectrum-canvas');
const ctx = canvas.getContext('2d');

// Adaptive display range — auto-calibrates to the actual noise floor/peak
// each frame (band conditions, gain, and antenna all shift the real dB
// range, so a fixed guess clips or wastes most of the visible height).
// Uses percentiles rather than literal min/max — a handful of bins that
// happen to read unusually low (FFT/windowing artifacts, nulls) aren't
// statistically representative of "the noise floor" and shouldn't be able
// to drag the whole calibration down by themselves.
let floorDb = -110, ceilDb = -40;
function updateDbRange(data) {
  const sorted = Array.from(data).sort((a, b) => a - b);
  const p10 = sorted[Math.floor(0.10 * (sorted.length - 1))];
  const p999 = sorted[Math.floor(0.999 * (sorted.length - 1))];
  if (!isFinite(p10) || !isFinite(p999)) return;
  const alpha = 0.05;   // slow smoothing so the range doesn't jitter frame to frame
  floorDb += ((p10 - 3) - floorDb) * alpha;
  ceilDb += ((p999 + 5) - ceilDb) * alpha;
}

// ── Manual calibration (Floor/Gain/Auto), matching commercial SDR controls ──
let autoScale = true;
let manualFloorDb = -90;
let manualRangeDb = 80;   // smaller range = more "gain"/contrast

function effectiveFloorCeil() {
  return autoScale ? [floorDb, ceilDb] : [manualFloorDb, manualFloorDb + manualRangeDb];
}

function onAutoScaleToggle(checked) {
  autoScale = checked;
  document.getElementById('floor-slider').disabled = checked;
  document.getElementById('gain-slider').disabled = checked;
}

function onFloorSlider(v) {
  manualFloorDb = parseFloat(v);
  document.getElementById('floor-val').textContent = manualFloorDb.toFixed(0) + ' dB';
}

// Marks the radio's actual live frequency (ground truth) — drawn on top of
// the data so it stays visible regardless of signal strength there. Not
// necessarily at the geometric center of the view: followRigFrequency()
// only recenters the view once this nears the edge, so it can sit anywhere
// in the visible window in between.
function drawRigMarker(c, w, h, dpr) {
  dpr = dpr || 1;
  if (rigFreqHz === null || viewCenterHz === null) return;
  const drawFreqHz = displayedRigFreqHz === null ? rigFreqHz : displayedRigFreqHz;
  const x = ((drawFreqHz - (viewCenterHz - viewSpanHz / 2)) / viewSpanHz) * w;
  if (x < 0 || x > w) return;   // panned away from where the rig is tuned

  c.save();
  c.strokeStyle = 'rgba(255, 214, 10, 0.85)';
  c.lineWidth = 1.5 * dpr;
  c.setLineDash([4, 4]);
  c.beginPath();
  c.moveTo(x, 0);
  c.lineTo(x, h);
  c.stroke();

  c.setLineDash([]);
  const label = (rigFreqHz / 1e6).toFixed(4) + ' MHz';
  c.font = `${12 * dpr}px monospace`;
  c.fillStyle = '#ffd60a';
  const labelW = c.measureText(label).width;
  const labelX = (x + labelW + 6 > w) ? x - labelW - 6 : x + 6;
  c.fillText(label, labelX, h - 6 * dpr);
  c.restore();
}

function onGainSlider(v) {
  // Slider is 0-100, higher = more gain = smaller dB range mapped to the
  // full color/height range (steeper response = more visual contrast).
  const g = parseFloat(v);
  manualRangeDb = 150 - (g / 100) * 140;   // 150dB (low gain) down to 10dB (high gain)
  document.getElementById('gain-val').textContent = manualRangeDb.toFixed(0) + ' dB range';
}

function drawSpectrum() {
  updateDisplayedRigFreq();
  updateSmeter();
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = Math.max(1, rect.width * dpr), h = Math.max(1, rect.height * dpr);
  if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
  ctx.clearRect(0, 0, w, h);

  // Digital mode renders from the fine spectrum (finer resolution, narrow
  // span) instead of the wideband capture — see latestFineFrame.
  const frame = (rigIsDigital && latestFineFrame) ? latestFineFrame : latestFrame;

  if (frame && viewCenterHz !== null) {
    document.getElementById('axis-lo').textContent = ((viewCenterHz - viewSpanHz / 2) / 1e6).toFixed(4) + ' MHz';
    document.getElementById('axis-center').textContent = (viewCenterHz / 1e6).toFixed(4) + ' MHz';
    document.getElementById('axis-hi').textContent = ((viewCenterHz + viewSpanHz / 2) / 1e6).toFixed(4) + ' MHz';
    updateFreqInputDisplay();

    const points = cropToView(frame, Math.round(w));
    // Calibrate from what's actually visible right now, not the full ~2MHz
    // capture — a quieter spot elsewhere in the capture would otherwise drag
    // the floor below what's relevant to the current zoomed-in view.
    if (autoScale) updateDbRange(points);
    const [floor, ceil] = effectiveFloorCeil();

    const xs = new Float32Array(points.length);
    const ys = new Float32Array(points.length);
    for (let i = 0; i < points.length; i++) {
      xs[i] = (i / (points.length - 1)) * w;
      const pct = Math.max(0, Math.min(1, (points[i] - floor) / (ceil - floor)));
      ys[i] = h - pct * h;
    }

    // Filled below the trace, then stroked on top — a solid fill reads as a
    // continuous signal level at a glance, where a thin line on a noisy
    // trace was easy to lose against the background.
    ctx.beginPath();
    ctx.moveTo(xs[0], ys[0]);
    for (let i = 1; i < points.length; i++) ctx.lineTo(xs[i], ys[i]);
    ctx.lineTo(xs[points.length - 1], h);
    ctx.lineTo(xs[0], h);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0, 212, 255, 0.25)';
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(xs[0], ys[0]);
    for (let i = 1; i < points.length; i++) ctx.lineTo(xs[i], ys[i]);
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 1.5 * dpr;
    ctx.stroke();

    drawRigMarker(ctx, w, h, dpr);
    drawCursorCrosshair(ctx, w, h, dpr);
  }

  drawWaterfallOverlay();
  requestAnimationFrame(drawSpectrum);
}

function drawCursorCrosshair(c, w, h, dpr) {
  if (cursorFreqHz === null || viewCenterHz === null) return;
  const cx = ((cursorFreqHz - (viewCenterHz - viewSpanHz / 2)) / viewSpanHz) * w;
  if (cx < 0 || cx > w) return;   // panned/zoomed away from where it was hovering

  c.save();
  c.strokeStyle = 'rgba(255, 255, 255, 0.55)';
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(cx, 0);
  c.lineTo(cx, h);
  c.stroke();

  const label = (cursorFreqHz / 1e6).toFixed(4) + ' MHz';
  c.font = `${12 * dpr}px monospace`;
  c.fillStyle = '#ffffff';
  const labelW = c.measureText(label).width;
  const labelX = (cx + labelW + 6 > w) ? cx - labelW - 6 : cx + 6;
  c.fillText(label, labelX, 14 * dpr);
  c.restore();
}

// ── Waterfall rendering ─────────────────────────────────────
const wfCanvas = document.getElementById('waterfall-canvas');
const wfCtx = wfCanvas.getContext('2d');

const PALETTES = {
  default: [   // black -> blue -> cyan -> green -> yellow -> red
    [0.00, 0, 0, 0],
    [0.20, 0, 0, 130],
    [0.40, 0, 180, 200],
    [0.60, 0, 220, 60],
    [0.80, 255, 220, 0],
    [1.00, 255, 30, 30],
  ],
  linrad: [   // approximation only — not verified against real Linrad output
    [0.00, 0, 0, 0],
    [0.15, 0, 0, 80],
    [0.35, 0, 0, 255],
    [0.55, 0, 255, 255],
    [0.70, 0, 255, 0],
    [0.85, 255, 255, 0],
    [0.95, 255, 0, 0],
    [1.00, 255, 255, 255],
  ],
};
let currentPalette = 'default';
function onPaletteSelect(v) { currentPalette = v; }

function dbToColor(db, floor, ceil) {
  const pct = Math.max(0, Math.min(1, (db - floor) / (ceil - floor)));
  const stops = PALETTES[currentPalette] || PALETTES.default;
  for (let i = 1; i < stops.length; i++) {
    if (pct <= stops[i][0]) {
      const [p0, r0, g0, b0] = stops[i - 1];
      const [p1, r1, g1, b1] = stops[i];
      const t = (pct - p0) / (p1 - p0 || 1);
      return [r0 + (r1 - r0) * t, g0 + (g1 - g0) * t, b0 + (b1 - b0) * t];
    }
  }
  return stops[stops.length - 1].slice(1);
}

function ensureWfCanvasSize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = wfCanvas.getBoundingClientRect();
  const w = Math.max(1, Math.round(rect.width * dpr)), h = Math.max(1, Math.round(rect.height * dpr));
  if (wfCanvas.width !== w || wfCanvas.height !== h) {
    wfCanvas.width = w;
    wfCanvas.height = h;
  }
  return { w, h };
}

// Separate overlay, fully redrawn every animation frame — the waterfall
// canvas itself is an incrementally-scrolled bitmap (each row push shifts
// the previous pixels down), so anything drawn directly into it becomes
// permanent history and scrolls along with the data. A live marker needs
// its own layer that gets cleared and repainted from scratch each frame,
// the same way the spectrum canvas already redraws everything every tick.
const wfOverlayCanvas = document.getElementById('waterfall-overlay-canvas');
const wfOverlayCtx = wfOverlayCanvas.getContext('2d');

function drawWaterfallOverlay() {
  const dpr = window.devicePixelRatio || 1;
  const rect = wfOverlayCanvas.getBoundingClientRect();
  const w = Math.max(1, Math.round(rect.width * dpr)), h = Math.max(1, Math.round(rect.height * dpr));
  if (wfOverlayCanvas.width !== w || wfOverlayCanvas.height !== h) {
    wfOverlayCanvas.width = w;
    wfOverlayCanvas.height = h;
  }
  wfOverlayCtx.clearRect(0, 0, w, h);
  drawRigMarker(wfOverlayCtx, w, h, dpr);
}

function pushWaterfallRow(frame) {
  const { w, h } = ensureWfCanvasSize();
  if (h < 2) return;
  const img = wfCtx.getImageData(0, 0, w, h - 1);
  wfCtx.putImageData(img, 0, 1);

  const points = cropToView(frame, w);
  const [floor, ceil] = effectiveFloorCeil();
  const row = wfCtx.createImageData(w, 1);
  for (let x = 0; x < w; x++) {
    const [r, g, b] = dbToColor(points[x], floor, ceil);
    row.data[x * 4 + 0] = r;
    row.data[x * 4 + 1] = g;
    row.data[x * 4 + 2] = b;
    row.data[x * 4 + 3] = 255;
  }
  wfCtx.putImageData(row, 0, 0);
}

function pushWaterfallTxRow() {
  const { w, h } = ensureWfCanvasSize();
  if (h < 2) return;
  const img = wfCtx.getImageData(0, 0, w, h - 1);
  wfCtx.putImageData(img, 0, 1);
  const row = wfCtx.createImageData(w, 1);
  for (let x = 0; x < w; x++) {
    row.data[x * 4 + 0] = 90; row.data[x * 4 + 1] = 50; row.data[x * 4 + 2] = 0; row.data[x * 4 + 3] = 255;
  }
  wfCtx.putImageData(row, 0, 0);
}

connectWs();
connectSpectrumWs();
updateSpanLabel();
requestAnimationFrame(drawSpectrum);
</script>
</body>
</html>
